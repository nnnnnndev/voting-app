<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}{{ branding.app_name }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    :root {
      --umass-red: {{ branding.primary_color }};
    }
  </style>
  <script src="/static/ballot.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      {% if not branding.logo_url %}
        <a href="/" class="brand-text">{{ branding.app_name }}</a>
      {% endif %}
    </div>
    <div class="who">
      {% if voter %}
        Signed in as <b>{{ voter.name }}</b> &middot;
        <a href="/auth/logout">sign out</a>
      {% else %}
        <a href="/auth/login">Sign in</a>
      {% endif %}
    </div>
  </header>
  {% if branding.logo_url %}
    <a href="/" class="page-logo-link" aria-label="{{ branding.app_name }} home">
      <img src="{{ branding.logo_url }}" alt="{{ branding.app_name }}" class="page-logo">
    </a>
  {% endif %}
  <main>
    {% block body %}{% endblock %}
  </main>
  <footer class="foot">
    {{ branding.footer_note }}
  </footer>
</body>
</html>
